name: Build Rain binary

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install UPX
        run: sudo apt-get install -y upx-ucl

      - name: Clone and build Rain for ARMv7
        run: |
          git clone --depth 1 https://github.com/cenkalti/rain /tmp/rain
          cd /tmp/rain
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="-s -w" -o /tmp/rain-armv7

      - name: Compress with UPX
        run: upx --best /tmp/rain-armv7

      - name: Copy binary to plugin
        run: |
          cp /tmp/rain-armv7 epublibre.koplugin/bin/rain
          chmod +x epublibre.koplugin/bin/rain

      - name: Commit and push if changed
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add epublibre.koplugin/bin/rain
          git diff --staged --quiet || (git commit -m "Update Rain binary" && git push)
